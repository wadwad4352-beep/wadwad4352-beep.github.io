<!DOCTYPE html>
<!-- 声明文档类型为HTML5 -->
<html lang="zh-CN">
<!-- lang="zh-CN" 表示页面语言为简体中文 -->
<head>
    <!-- 页面元信息 -->
    <meta charset="UTF-8">
    <!-- 字符编码：UTF-8（避免中文乱码） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 适配手机等移动设备 -->
    <title>我的主页</title>
    <!-- 页面标题（浏览器标签显示） -->
    <style>
        /* 简单样式，让页面更美观（可选） */
        body {
            font-family: Arial, 微软雅黑;
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }
        a {
            color: #0366d6; /* GitHub 风格的蓝色链接 */
            text-decoration: none;
            font-size: 18px;
        }
        a:hover {
            text-decoration: underline; /* 鼠标悬浮时显示下划线 */
        }
        .link-item {
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <!-- 页面可见内容 -->
    <h1>欢迎来到我的主页</h1>
    <p>点击下方链接访问对应页面：</p>

    <!-- 跳转到 a.html -->
    <div class="link-item">
        <a href="a.html">点击打开 a.html 页面</a>
    </div>

    <!-- 跳转到 b.html（注意：统一小写，避免GitHub大小写问题） -->
    <div class="link-item">
        <a href="b.html">点击打开 b.html 页面</a>
    </div>
</body>
</html>
